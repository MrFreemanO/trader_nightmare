
version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite:///app.db}
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-here}
      - DEBUG=${DEBUG:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - VIABILITY_THRESHOLD=${VIABILITY_THRESHOLD:-70.0}
      - MAX_POSITION_SIZE=${MAX_POSITION_SIZE:-1000.0}
      - SLIPPAGE_TOLERANCE=${SLIPPAGE_TOLERANCE:-0.02}
      - STOP_LOSS_PERCENTAGE=${STOP_LOSS_PERCENTAGE:-0.15}
      - TAKE_PROFIT_PERCENTAGE=${TAKE_PROFIT_PERCENTAGE:-0.25}
      - MAX_CONCURRENT_POSITIONS=${MAX_CONCURRENT_POSITIONS:-5}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
    volumes:
      - ./backend/logs:/app/logs
      - ./backend/data:/app/data
      - ./backend/database:/app/database
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/trading/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - trader-network

  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    environment:
      - VITE_API_URL=http://backend:5000
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - trader-network

networks:
  trader-network:
    driver: bridge

volumes:
  logs:
  data:
  database:
